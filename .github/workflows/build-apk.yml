name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Zulu is reliable for Android SDKs
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate and Rename APK
        run: |
          # Find any generated apk files
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          mkdir -p build-artifacts
          cp "$APK_PATH" build-artifacts/power-menu-debug.apk
          echo "APK_READY=build-artifacts/power-menu-debug.apk" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: power-menu-debug-apk
          path: build-artifacts/power-menu-debug.apk
          if-no-files-found: error
          retention-days: 7
